<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Digital Validation Server</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background: white; }
        .btn-verify { background: #4e73df; border: none; border-radius: 12px; padding: 12px; font-weight: 600; transition: 0.3s; }
        .btn-verify:hover { background: #2e59d9; transform: translateY(-2px); }
        .status-badge { border-radius: 8px; padding: 5px 12px; font-size: 0.85rem; font-weight: bold; }
        .bg-valid { background-color: #d1e7dd; color: #0f5132; }
        .bg-invalid { background-color: #f8d7da; color: #842029; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h2 class="fw-bold text-dark">Мултиплатформски Систем за Валидација на Дигитални Потписи</h2>
        <p class="text-muted">Поддршка за PDF (PAdES), Office (XAdES/OOXML), самостојни сертификати и чисти криптографски потписи (.p7s CAdES)</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="main-card p-4">
                <h5 class="mb-4 text-secondary">Валидација на фајл</h5>

                <div th:if="${message}" class="alert alert-success border-0 shadow-sm" th:text="${message}">
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger border-0 shadow-sm" th:text="${errorMessage}">
                </div>

                <form th:action="@{/verify}" method="post" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase text-muted">Избери документ, сертификат или .p7s потпис</label>
                        <input type="file" name="document" class="form-control" accept=".pdf, .cer, .crt, .der, .p7s, .pptx, .docx, .xlsx" required>
                    </div>
                    <button type="submit" class="btn btn-verify btn-primary w-100 text-white">ПРОВЕРИ ПОТПИС</button>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <div class="main-card p-4 h-100">
                <h5 class="mb-4 text-secondary">Историја во PostgreSQL</h5>
                <div class="table-responsive">
                    <table class="table table-hover mt-2">
                        <thead>
                        <tr class="text-muted small">
                            <th>ФАЈЛ</th>
                            <th>ИЗДАВАЧ / ПОТПИСНИК</th>
                            <th class="text-end">СТАТУС</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="log : ${history}">
                            <td th:text="${log.fileName}" class="fw-bold small"></td>
                            <td th:text="${log.signerName}" class="text-muted small"></td>
                            <td class="text-end">
                                    <span th:class="${log.isValid} ? 'status-badge bg-valid' : 'status-badge bg-invalid'"
                                          th:text="${log.isValid} ? 'ВАЛИДЕН' : 'НЕВАЛИДЕН'">
                                    </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
